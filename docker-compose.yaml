services:
  douyin-monitor:
    image: czerov/dy-dl:latest
    container_name: douyin-monitor
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./downloads:/downloads
    ports:
      - "3456:3456"
    command: douyin-nas-monitor --config /app/data/config.yaml --web --addr :3456
    restart: unless-stopped
